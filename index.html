<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা AI ভয়েস স্টুডিও</title>
    <style>
        /* বেসিক সেটআপ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* গ্লাসের মতো দেখতে মূল বক্স */
        .app-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }
        .app-container h2 {
            font-size: 24px;
            margin-bottom: 5px;
            background: -webkit-linear-gradient(#00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-container p.subtitle {
            font-size: 13px;
            color: #b0bec5;
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #00d2ff;
            background: rgba(0, 0, 0, 0.4);
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #00d2ff;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        audio {
            width: 100%;
            margin-top: 20px;
            display: none;
            border-radius: 30px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>বাংলা AI ভয়েস স্টুডিও</h2>
        <p class="subtitle">আপনার লেখাকে দিন কথার রূপ</p>
        
        <textarea id="text-input" placeholder="এখানে বাংলায় কিছু লিখুন... (যেমন: আমি এআই দিয়ে ওয়েবসাইট বানিয়েছি)"></textarea>
        
        <button id="generate-btn">ভয়েস তৈরি করুন</button>
        
        <div id="status-msg">এআই প্রসেস করছে, একটু অপেক্ষা করুন...</div>
        
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        // আপনার API Key (সঠিক ফরমেটে)
        const API_TOKEN = "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"; 
        
        // Vercel Proxy লিংক (CORS এরর সমাধানের জন্য)
        const API_URL = "/api/tts";

        const textInput = document.getElementById('text-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusMsg = document.getElementById('status-msg');
        const audioPlayer = document.getElementById('audio-player');

        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            
            if (!text) {
                alert("দয়া করে বক্সে কিছু লিখুন!");
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerText = "প্রসেসিং হচ্ছে...";
            statusMsg.style.display = "block";
            audioPlayer.style.display = "none";

            try {
                const response = await fetch(API_URL, {
                    headers: { 
                        "Authorization": `Bearer ${API_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    if (errorData.error && errorData.error.includes("loading")) {
                         throw new Error("AI মডেলটি ঘুমিয়ে ছিল, চালু হচ্ছে। ২০-৩০ সেকেন্ড পর আবার ট্রাই করুন!");
                    }
                    throw new Error("সার্ভার ব্যস্ত আছে। আবার চেষ্টা করুন।");
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);

                audioPlayer.src = audioUrl;
                audioPlayer.style.display = "block";
                audioPlayer.play();

            } catch (error) {
                alert(error.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "ভয়েস তৈরি করুন";
                statusMsg.style.display = "none";
            }
        });
    </script>

</body>
</html>
