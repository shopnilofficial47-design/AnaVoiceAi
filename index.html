<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা AI ভয়েস স্টুডিও</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .app-container h2 { font-size: 24px; margin-bottom: 5px; background: -webkit-linear-gradient(#00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container p.subtitle { font-size: 13px; color: #b0bec5; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 15px; color: #ffffff; font-size: 16px; resize: none; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #ffffff; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status-msg { margin-top: 15px; font-size: 14px; color: #00d2ff; display: none; }
        audio { width: 100%; margin-top: 20px; display: none; border-radius: 30px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>বাংলা AI ভয়েস স্টুডিও</h2>
        <p class="subtitle">আপনার লেখাকে দিন কথার রূপ</p>
        
        <textarea id="text-input" placeholder="এখানে বাংলায় কিছু লিখুন..."></textarea>
        
        <button id="generate-btn">ভয়েস তৈরি করুন</button>
        
        <div id="status-msg"></div>
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        const API_TOKEN = "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"; 
        // সরাসরি লিংকে আবার ফিরে গেলাম
        const API_URL = "https://api-inference.huggingface.co/models/facebook/mms-tts-ben";

        const textInput = document.getElementById('text-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusMsg = document.getElementById('status-msg');
        const audioPlayer = document.getElementById('audio-player');

        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) { alert("দয়া করে বক্সে কিছু লিখুন!"); return; }

            generateBtn.disabled = true;
            generateBtn.innerText = "প্রসেসিং হচ্ছে...";
            statusMsg.style.display = "block";
            statusMsg.style.color = "#00d2ff";
            statusMsg.innerText = "এআই ভয়েস তৈরি করছে, ২০-৩০ সেকেন্ড অপেক্ষা করুন...";
            audioPlayer.style.display = "none";

            try {
                let response = await fetch(API_URL, {
                    headers: { 
                        "Authorization": `Bearer ${API_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                });

                // এআই যদি ঘুমিয়ে থাকে, তবে এই ব্লকটি কাজ করবে
                if (response.status === 503) {
                    const json = await response.json();
                    let waitTime = Math.round(json.estimated_time || 20);
                    throw new Error(`এআই সার্ভার ঘুমিয়ে ছিল, এখন চালু হচ্ছে। দয়া করে ${waitTime} সেকেন্ড পর আবার বাটনে চাপ দিন।`);
                }

                if (!response.ok) {
                    throw new Error("সার্ভার বা কানেকশনে সমস্যা। আবার ট্রাই করুন।");
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);

                audioPlayer.src = audioUrl;
                audioPlayer.style.display = "block";
                audioPlayer.play();
                statusMsg.style.display = "none";

            } catch (error) {
                statusMsg.style.color = "#ff4b4b";
                statusMsg.innerText = error.message;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = "ভয়েস তৈরি করুন";
            }
        });
    </script>

</body>
</html>
